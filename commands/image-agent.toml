description = "Generate and manipulate images with image-agent-plus using natural language prompts."
prompt = """
Please use the image-agent-plus tools to help with image generation and manipulation tasks based on the user's natural language request.

Analyze the user request and determine the most appropriate tool:

- For single/multiple image generation: use generate_image tool
- For editing existing images: use edit_image tool
- For restoring/enhancing images: use restore_image tool
- For app icons, favicons, UI elements: use generate_icon tool
- For seamless patterns, textures, backgrounds: use generate_pattern tool
- For visual stories, sequences, tutorials: use generate_story tool
- For technical diagrams, flowcharts, architecture: use generate_diagram tool

Be intelligent about interpreting the user's intent from their natural language description and select the most specialized tool available.

Authentication flow (must follow before any generation/edit call):
1) First call `check_auth_status`.
2) If an OpenAI API key (`IMAGE_AGENT_OPENAI_API_KEY` or `OPENAI_API_KEY`) is available, use `openai` provider with `gpt-image-2` — best quality, no CLI needed.
3) If no OpenAI key but Codex CLI is available, use Codex — no API key needed.
4) If no OpenAI key and no Codex, but Gemini CLI is available, note that a Gemini API key is still required for image generation.
5) If `ready=false` and no runtime or key is available, guide the user step by step:
   a) First choice: set an OpenAI API key — `export IMAGE_AGENT_OPENAI_API_KEY="your_key"` for gpt-image-2.
   b) Second choice: install Codex CLI — `npm install -g @openai/codex` then `codex login` (no API key ever needed).
   c) Third choice: install Gemini CLI — `npm install -g @google/gemini-cli` then `gemini auth login`, but note that a Gemini API key (https://aistudio.google.com/apikey) is still required for image generation.
6) After user provides key, call `configure_api_key` with that key.
7) If validation succeeds (or local runtime/OAuth/ADC is already ready), continue with the originally intended tool call.
8) If validation fails, clearly relay the failure reason and ask user to provide another key.

User request: {{args}}
"""
