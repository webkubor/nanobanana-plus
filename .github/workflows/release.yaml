# This is a GitHub Actions workflow to automate building and releasing your extension.
# It will trigger automatically whenever you push a new tag that starts with 'v' (e.g., v1.0.0).

name: Create Release

on:
  # This allows the workflow to be triggered when a new tag is pushed
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0, v1.0.1, etc.
  
  # This allows you to run the workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  # This permission is required for the action to create a GitHub Release
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. Checks out your repository's code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 2. Sets up the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 3. Install dependencies
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 4. Runs your build script
      - name: Run build
        run: pnpm run build

      # 5. Update extension version from tag
      - name: Update extension version
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/v//')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" gemini-extension.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      # 6. Create npm-compatible package tarball for Codex / pnpm / npm installs
      - name: Pack release artifact
        run: pnpm pack

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/v//')
          # 提取当前版本的 CHANGELOG 内容（从 ## [x.x.x] 到下一个 ## 之间）
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # 写入临时文件（避免特殊字符问题）
          echo "$NOTES" > /tmp/release_notes.md
          echo "Extracted release notes for v${VERSION}"
          cat /tmp/release_notes.md

      - name: Create GitHub Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/v//')
          gh release create ${{ github.ref_name }} \
             --title "${{ github.ref_name }} 🍌+ Per-call Model Switching + Aspect Ratio" \
             --notes-file /tmp/release_notes.md \
             nanobanana-extension-${VERSION}.tgz
